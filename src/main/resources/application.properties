spring.application.name=wallet-app
server.port=7000

spring.datasource.url=jdbc:postgresql://localhost:5432/wallet-dev
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=wallet-app-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
app.jwt.expiration=86400000

logging.level.com.wallet=INFO
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
