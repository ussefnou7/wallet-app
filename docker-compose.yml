services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wallet-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 7000
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/wallet-dev
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_JWT_SECRET: wallet-app-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
      APP_JWT_EXPIRATION: 86400000
    ports:
      - "7000:7000"
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: wallet-db
    environment:
      POSTGRES_DB: wallet-dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet-dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
